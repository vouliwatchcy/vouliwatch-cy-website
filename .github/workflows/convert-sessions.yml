name: Convert Sessions

on:
  push:
    paths:
      - 'sessions/**/*.md'
    branches:
      - main
      - master

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run conversion script
        run: npm run convert-sessions

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/sessions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-convert sessions from markdown" && git push)
